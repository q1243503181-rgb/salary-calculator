<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>工资计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 12px;
            display: flex;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 20px;
            width: 100%;
            max-width: 480px;
            margin: 10px auto;
        }

        h1 {
            text-align: center;
            color: #1e40af;
            margin-bottom: 16px;
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #374151;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
            background: #f9fafb;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .month-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            gap: 10px;
        }

        .month-nav button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            min-width: 70px;
        }

        .month-nav span {
            font-size: 18px;
            font-weight: 600;
            color: #1e40af;
        }

        .calendar {
            background: #f8fafc;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 14px;
        }

        .calendar-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 3px;
            margin-bottom: 6px;
            text-align: center;
        }

        .calendar-header div {
            font-weight: 600;
            color: #64748b;
            font-size: 11px;
            padding: 6px 0;
        }

        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 3px;
        }

        .day-item {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            cursor: pointer;
            background: white;
            min-height: 40px;
            position: relative;
        }

        .day-item:active {
            transform: scale(0.95);
        }

        .day-item.weekday {
            background: #dbeafe;
            border-color: #3b82f6;
        }

        .day-item.weekend {
            background: #fef3c7;
            border-color: #f59e0b;
        }

        .day-item.holiday {
            background: #fecaca;
            border-color: #ef4444;
        }

        .day-number {
            font-size: 14px;
            font-weight: 600;
            color: #1f2937;
        }

        .day-hours {
            font-size: 10px;
            color: #059669;
            font-weight: 600;
        }

        .day-type {
            font-size: 8px;
            color: #64748b;
        }

        .day-holiday-name {
            font-size: 8px;
            color: #dc2626;
            font-weight: 600;
            position: absolute;
            bottom: 2px;
        }

        .legend {
            margin-top: 12px;
            padding: 12px;
            background: #fef3c7;
            border-radius: 10px;
            font-size: 12px;
            color: #92400e;
        }

        .legend h4 {
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 13px;
        }

        .holiday-legend {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-top: 10px;
            font-size: 11px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .legend-dot.custom { background: #f59e0b; }
        .legend-dot.weekend { background: #fbbf24; }
        .legend-dot.weekday { background: #3b82f6; }

        .overtime-summary {
            background: #f0fdf4;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 12px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .summary-item {
            text-align: center;
        }

        .summary-label {
            font-size: 11px;
            color: #64748b;
            margin-bottom: 4px;
        }

        .summary-value {
            font-size: 16px;
            font-weight: 700;
            color: #1e40af;
        }

        .summary-pay {
            font-size: 12px;
            font-weight: 600;
            color: #059669;
            margin-top: 2px;
        }

        .overtime-summary-total {
            background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 14px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 14px;
        }

        .summary-row:first-child {
            border-bottom: 1px solid rgba(59, 130, 246, 0.3);
            margin-bottom: 6px;
        }

        .summary-row span:first-child {
            color: #1e40af;
            font-weight: 500;
        }

        .summary-row span:last-child {
            font-weight: 700;
            color: #1d4ed8;
        }

        .summary-row.highlight span:last-child {
            color: #059669;
            font-size: 16px;
        }

        .btn-calculate {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 14px;
        }

        .btn-calculate:active {
            transform: scale(0.98);
        }

        .result-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #e5e7eb;
        }

        .result-title {
            font-size: 16px;
            font-weight: 600;
            color: #1e40af;
            margin-bottom: 14px;
            text-align: center;
        }

        .result-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .result-item {
            background: #f8fafc;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
        }

        .result-label {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 4px;
        }

        .result-value {
            font-size: 18px;
            font-weight: 700;
            color: #1e40af;
        }

        .result-value.highlight {
            color: #059669;
            font-size: 20px;
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 16px;
            max-width: 360px;
            width: 100%;
        }

        .modal h3 {
            margin-bottom: 16px;
            color: #1e40af;
            font-size: 18px;
            text-align: center;
        }

        .overtime-info {
            background: #f8fafc;
            padding: 14px;
            border-radius: 10px;
            margin-bottom: 16px;
            text-align: center;
        }

        .overtime-rate {
            font-size: 16px;
            font-weight: 600;
            color: #1e40af;
        }

        .modal-input {
            margin-bottom: 16px;
        }

        .modal-input label {
            display: block;
            margin-bottom: 6px;
            color: #374151;
            font-weight: 500;
            font-size: 14px;
        }

        .modal-input input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
        }

        .modal-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .btn-primary, .btn-secondary, .btn-danger {
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
        }

        .btn-secondary {
            background: #e5e7eb;
            color: #374151;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
            grid-column: span 2;
        }

        /* 手机优化 */
        @media (max-width: 480px) {
            body {
                padding: 8px;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            }

            .container {
                padding: 16px;
                margin: 6px auto;
                border-radius: 12px;
            }

            h1 {
                font-size: 20px;
                margin-bottom: 14px;
            }

            .form-group {
                margin-bottom: 12px;
            }

            .form-group input {
                padding: 14px;
                font-size: 16px;
            }

            .month-nav button {
                padding: 10px 12px;
                font-size: 13px;
                min-width: 60px;
            }

            .month-nav span {
                font-size: 16px;
            }

            .calendar {
                padding: 10px;
                margin-bottom: 12px;
            }

            .calendar-header div {
                font-size: 10px;
                padding: 4px 0;
            }

            .calendar-days {
                gap: 2px;
            }

            .day-item {
                min-height: 36px;
                border-radius: 6px;
            }

            .day-number {
                font-size: 12px;
            }

            .day-hours {
                font-size: 9px;
            }

            .day-type {
                font-size: 7px;
            }

            .overtime-summary {
                padding: 10px;
                gap: 6px;
            }

            .summary-label {
                font-size: 10px;
            }

            .summary-value {
                font-size: 14px;
            }

            .summary-pay {
                font-size: 11px;
            }

            .overtime-summary-total {
                padding: 10px;
            }

            .summary-row {
                font-size: 13px;
            }

            .btn-calculate {
                padding: 16px;
                font-size: 16px;
            }

            .result-grid {
                gap: 8px;
            }

            .result-item {
                padding: 10px;
            }

            .result-label {
                font-size: 11px;
            }

            .result-value {
                font-size: 16px;
            }

            .modal-content {
                padding: 20px;
            }

            .modal h3 {
                font-size: 16px;
            }

            .modal-input input {
                padding: 14px;
                font-size: 16px;
            }

            .modal-buttons {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }

            .btn-primary, .btn-secondary, .btn-danger {
                padding: 14px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 工资计算器</h1>

        <div class="form-group">
            <label for="baseSalary">基本工资（元）</label>
            <input type="number" id="baseSalary" placeholder="请输入基本工资" min="0" step="0.01">
        </div>

        <div class="form-group">
            <label for="performanceBonus">绩效补贴（元）</label>
            <input type="number" id="performanceBonus" placeholder="0" min="0" step="0.01" value="0">
        </div>

        <div class="month-nav">
            <button onclick="changeMonth(-1)">◀ 上月</button>
            <span id="currentMonth"></span>
            <button onclick="changeMonth(1)">下月 ▶</button>
        </div>

        <div class="calendar">
            <div class="calendar-header">
                <div>日</div>
                <div>一</div>
                <div>二</div>
                <div>三</div>
                <div>四</div>
                <div>五</div>
                <div>六</div>
            </div>
            <div class="calendar-days" id="calendarDays"></div>
        </div>

        <div class="legend">
            <h4>📅 图例说明</h4>
            <div class="holiday-legend">
                <div class="legend-item">
                    <div class="legend-dot custom"></div>
                    <span>自定义节假日</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot weekend"></div>
                    <span>周末</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot weekday"></div>
                    <span>工作日</span>
                </div>
            </div>
        </div>

        <div class="overtime-summary">
            <div class="summary-item">
                <div class="summary-label">工作日加班</div>
                <div class="summary-value" id="summaryWeekday">0h</div>
                <div class="summary-pay" id="summaryWeekdayPay">¥0.00</div>
            </div>
            <div class="summary-item">
                <div class="summary-label">周末加班</div>
                <div class="summary-value" id="summaryWeekend">0h</div>
                <div class="summary-pay" id="summaryWeekendPay">¥0.00</div>
            </div>
            <div class="summary-item">
                <div class="summary-label">节假日加班</div>
                <div class="summary-value" id="summaryHoliday">0h</div>
                <div class="summary-pay" id="summaryHolidayPay">¥0.00</div>
            </div>
        </div>

        <div class="overtime-summary-total">
            <div class="summary-row">
                <span>合计加班小时</span>
                <span id="summaryTotalHours">0h</span>
            </div>
            <div class="summary-row highlight">
                <span>预估加班工资</span>
                <span id="summaryOvertimePay">¥0.00</span>
            </div>
        </div>

        <button class="btn-calculate" onclick="calculate()">计算工资</button>

        <div class="result-section" id="resultSection" style="display: none;">
            <div class="result-title">📊 计算结果</div>
            <div class="result-grid">
                <div class="result-item">
                    <div class="result-label">基本工资</div>
                    <div class="result-value" id="resultBase"></div>
                </div>
                <div class="result-item">
                    <div class="result-label">加班工资</div>
                    <div class="result-value" id="resultOvertime"></div>
                </div>
                <div class="result-item">
                    <div class="result-label">绩效补贴</div>
                    <div class="result-value" id="resultBonus"></div>
                </div>
                <div class="result-item">
                    <div class="result-label">实发工资</div>
                    <div class="result-value highlight" id="resultNet"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="overtimeModal" onclick="handleModalClick(event)">
        <div class="modal-content">
            <h3 id="modalTitle">添加加班</h3>
            <div class="overtime-info" id="overtimeInfo">
                <div class="overtime-rate">工作日加班 ×1.5</div>
            </div>
            <div class="overtime-info" id="holidayInfo" style="display: none; background: #fef2f2;">
                <div class="overtime-rate" style="color: #f59e0b;">🎊 自定义节假日</div>
            </div>
            <div class="modal-input">
                <label>加班小时数</label>
                <input type="number" id="overtimeHours" placeholder="请输入加班小时数" min="0.5" step="0.5" value="3">
            </div>
            <div class="modal-buttons">
                <button class="btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn-secondary" onclick="toggleHoliday()" id="holidayBtn">标记节假日</button>
                <button class="btn-danger" onclick="deleteOvertime()" id="deleteBtn" style="display: none;">删除</button>
                <button class="btn-primary" onclick="saveOvertime()">保存</button>
            </div>
        </div>
    </div>

    <script>
        let currentDate = new Date();
        let selectedDay = null;
        let overtimeData = {};
        let customHolidays = {};

        function getDaysInMonth(year, month) {
            return new Date(year, month, 0).getDate();
        }

        function getFirstDayOfMonth(year, month) {
            return new Date(year, month - 1, 1).getDay();
        }

        function isWeekend(year, month, day) {
            const date = new Date(year, month - 1, day);
            return date.getDay() === 0 || date.getDay() === 6;
        }

        function formatDateKey(year, month, day) {
            return `${year}-${month.toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}`;
        }

        function getHolidayName(year, month, day) {
            const dateKey = formatDateKey(year, month, day);
            return customHolidays[dateKey] || null;
        }

        function isCustomHoliday(year, month, day) {
            return customHolidays[formatDateKey(year, month, day)] !== undefined;
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth() + 1;
            document.getElementById('currentMonth').textContent = `${year}年${month}月`;

            const daysInMonth = getDaysInMonth(year, month);
            const firstDay = getFirstDayOfMonth(year, month);
            const calendarDays = document.getElementById('calendarDays');
            calendarDays.innerHTML = '';

            for (let i = 0; i < firstDay; i++) {
                const empty = document.createElement('div');
                empty.style.visibility = 'hidden';
                calendarDays.appendChild(empty);
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dayItem = document.createElement('div');
                const dateKey = formatDateKey(year, month, day);
                const overtime = overtimeData[dateKey];
                const holidayName = getHolidayName(year, month, day);
                const isCustom = isCustomHoliday(year, month, day);
                const isWeekendDay = isWeekend(year, month, day);

                if (overtime) {
                    dayItem.classList.add(overtime.type);
                } else if (isCustom) {
                    dayItem.classList.add('holiday');
                } else if (isWeekendDay) {
                    dayItem.classList.add('weekend');
                } else {
                    dayItem.classList.add('weekday');
                }

                const dayNumber = document.createElement('div');
                dayNumber.className = 'day-number';
                dayNumber.textContent = day;
                dayItem.appendChild(dayNumber);

                if (holidayName) {
                    const label = document.createElement('div');
                    label.className = 'day-holiday-name';
                    label.textContent = holidayName;
                    dayItem.appendChild(label);
                }

                if (overtime) {
                    const hours = document.createElement('div');
                    hours.className = 'day-hours';
                    hours.textContent = `+${overtime.hours}h`;
                    dayItem.appendChild(hours);

                    const type = document.createElement('div');
                    type.className = 'day-type';
                    type.textContent = { weekday: '平日', weekend: '周末', holiday: '假日' }[overtime.type];
                    dayItem.appendChild(type);
                }

                dayItem.onclick = () => openDayModal(year, month, day);
                calendarDays.appendChild(dayItem);
            }
            updateSummary();
        }

        function changeMonth(delta) {
            currentDate.setMonth(currentDate.getMonth() + delta);
            renderCalendar();
        }

        function getDayType(year, month, day) {
            const dateKey = formatDateKey(year, month, day);
            const overtime = overtimeData[dateKey];
            if (overtime) return overtime.type;
            if (isCustomHoliday(year, month, day)) return 'holiday';
            if (isWeekend(year, month, day)) return 'weekend';
            return 'weekday';
        }

        function openDayModal(year, month, day) {
            selectedDay = { year, month, day };
            const dateKey = formatDateKey(year, month, day);
            const overtime = overtimeData[dateKey];
            const dayType = getDayType(year, month, day);
            const holidayName = getHolidayName(year, month, day);

            const typeInfo = {
                weekday: { label: '工作日加班', rate: '×1.5', color: '#3b82f6' },
                weekend: { label: '周末加班', rate: '×2', color: '#f59e0b' },
                holiday: { label: '节假日加班', rate: '×3', color: '#ef4444' }
            };

            document.getElementById('modalTitle').textContent = `${year}年${month}月${day}日`;
            document.getElementById('overtimeHours').value = overtime ? overtime.hours : 3;
            document.getElementById('overtimeInfo').innerHTML = `
                <div class="overtime-rate" style="color: ${typeInfo[dayType].color};">
                    ${typeInfo[dayType].label} ${typeInfo[dayType].rate}
                </div>`;
            
            const holidayInfo = document.getElementById('holidayInfo');
            const holidayBtn = document.getElementById('holidayBtn');
            
            if (holidayName) {
                holidayInfo.style.display = 'block';
                holidayBtn.textContent = '取消标记';
                holidayBtn.style.display = 'block';
            } else {
                holidayInfo.style.display = 'none';
                holidayBtn.textContent = '标记节假日';
                holidayBtn.style.display = 'block';
            }
            
            document.getElementById('deleteBtn').style.display = overtime ? 'block' : 'none';
            document.getElementById('overtimeModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('overtimeModal').style.display = 'none';
            selectedDay = null;
        }

        function handleModalClick(event) {
            if (event.target === event.currentTarget) closeModal();
        }

        function toggleHoliday() {
            if (!selectedDay) return;
            const dateKey = formatDateKey(selectedDay.year, selectedDay.month, selectedDay.day);
            if (isCustomHoliday(selectedDay.year, selectedDay.month, selectedDay.day)) {
                delete customHolidays[dateKey];
            } else {
                customHolidays[dateKey] = '节假日';
            }
            openDayModal(selectedDay.year, selectedDay.month, selectedDay.day);
            renderCalendar();
        }

        function saveOvertime() {
            if (!selectedDay) return;
            const hours = parseFloat(document.getElementById('overtimeHours').value) || 0;
            if (hours <= 0) {
                alert('请输入有效的加班小时数');
                return;
            }
            const dateKey = formatDateKey(selectedDay.year, selectedDay.month, selectedDay.day);
            const dayType = getDayType(selectedDay.year, selectedDay.month, selectedDay.day);
            overtimeData[dateKey] = { hours, type: dayType };
            closeModal();
            renderCalendar();
        }

        function deleteOvertime() {
            if (!selectedDay) return;
            delete overtimeData[formatDateKey(selectedDay.year, selectedDay.month, selectedDay.day)];
            closeModal();
            renderCalendar();
        }

        function updateSummary() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth() + 1;
            const baseSalary = parseFloat(document.getElementById('baseSalary').value) || 0;
            
            let weekdayHours = 0, weekendHours = 0, holidayHours = 0;

            for (let day = 1; day <= getDaysInMonth(year, month); day++) {
                const dateKey = formatDateKey(year, month, day);
                const overtime = overtimeData[dateKey];
                if (overtime) {
                    if (overtime.type === 'weekday') weekdayHours += overtime.hours;
                    else if (overtime.type === 'weekend') weekendHours += overtime.hours;
                    else if (overtime.type === 'holiday') holidayHours += overtime.hours;
                }
            }

            const totalHours = weekdayHours + weekendHours + holidayHours;
            let weekdayPay = 0, weekendPay = 0, holidayPay = 0;
            
            if (baseSalary > 0) {
                const monthlyPayDays = 21.75;
                const dailyWage = baseSalary / monthlyPayDays;
                const hourlyWage = dailyWage / 8;
                weekdayPay = hourlyWage * 1.5 * weekdayHours;
                weekendPay = hourlyWage * 2 * weekendHours;
                holidayPay = hourlyWage * 3 * holidayHours;
            }

            document.getElementById('summaryWeekday').textContent = `${weekdayHours}h`;
            document.getElementById('summaryWeekend').textContent = `${weekendHours}h`;
            document.getElementById('summaryHoliday').textContent = `${holidayHours}h`;
            document.getElementById('summaryWeekdayPay').textContent = `¥${weekdayPay.toFixed(2)}`;
            document.getElementById('summaryWeekendPay').textContent = `¥${weekendPay.toFixed(2)}`;
            document.getElementById('summaryHolidayPay').textContent = `¥${holidayPay.toFixed(2)}`;
            document.getElementById('summaryTotalHours').textContent = `${totalHours}h`;
            document.getElementById('summaryOvertimePay').textContent = `¥${(weekdayPay + weekendPay + holidayPay).toFixed(2)}`;
        }

        function calculate() {
            const baseSalary = parseFloat(document.getElementById('baseSalary').value) || 0;
            const performanceBonus = parseFloat(document.getElementById('performanceBonus').value) || 0;

            if (baseSalary <= 0) {
                alert('请输入有效的基本工资');
                return;
            }

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth() + 1;
            const monthlyPayDays = 21.75;
            const dailyWage = baseSalary / monthlyPayDays;
            const hourlyWage = dailyWage / 8;

            let weekdayHours = 0, weekendHours = 0, holidayHours = 0;

            for (let day = 1; day <= getDaysInMonth(year, month); day++) {
                const dateKey = formatDateKey(year, month, day);
                const overtime = overtimeData[dateKey];
                if (overtime) {
                    if (overtime.type === 'weekday') weekdayHours += overtime.hours;
                    else if (overtime.type === 'weekend') weekendHours += overtime.hours;
                    else if (overtime.type === 'holiday') holidayHours += overtime.hours;
                }
            }

            const totalOvertimePay = hourlyWage * (1.5 * weekdayHours + 2 * weekendHours + 3 * holidayHours);
            const netSalary = baseSalary + totalOvertimePay + performanceBonus;

            document.getElementById('resultBase').textContent = `¥${baseSalary.toFixed(2)}`;
            document.getElementById('resultOvertime').textContent = `¥${totalOvertimePay.toFixed(2)}`;
            document.getElementById('resultBonus').textContent = `¥${performanceBonus.toFixed(2)}`;
            document.getElementById('resultNet').textContent = `¥${netSalary.toFixed(2)}`;
            document.getElementById('resultSection').style.display = 'block';
        }

        window.onload = function() {
            try {
                const saved = localStorage.getItem('salaryCalculatorSettings');
                if (saved) {
                    const settings = JSON.parse(saved);
                    if (settings.baseSalary) document.getElementById('baseSalary').value = settings.baseSalary;
                    if (settings.performanceBonus) document.getElementById('performanceBonus').value = settings.performanceBonus;
                }
            } catch (e) {}
            renderCalendar();

            document.getElementById('baseSalary').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') calculate();
            });
            document.getElementById('baseSalary').addEventListener('input', function() {
                updateSummary();
                saveSettings();
            });
            document.getElementById('performanceBonus').addEventListener('input', function() {
                updateSummary();
                saveSettings();
            });
        };

        function saveSettings() {
            try {
                localStorage.setItem('salaryCalculatorSettings', JSON.stringify({
                    baseSalary: document.getElementById('baseSalary').value,
                    performanceBonus: document.getElementById('performanceBonus').value
                }));
            } catch (e) {}
        }
    </script>
</body>
</html>
